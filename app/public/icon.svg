<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="75%">
      <stop offset="0%" stop-color="#10161c"/>
      <stop offset="100%" stop-color="#0B0D12"/>
    </radialGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
  </defs>
  <!-- full-bleed background so the icon works as a maskable too -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- centered EQ / waveform mark, kept inside the ~80% maskable safe zone -->
  <g fill="url(#bar)">
    <rect x="118" y="186" width="44" height="140" rx="22"/>
    <rect x="186" y="146" width="44" height="220" rx="22"/>
    <rect x="254" y="106" width="44" height="300" rx="22"/>
    <rect x="322" y="166" width="44" height="180" rx="22"/>
    <rect x="390" y="196" width="4"  height="120" rx="2"/>
    <rect x="378" y="190" width="44" height="132" rx="22"/>
  </g>
</svg>
